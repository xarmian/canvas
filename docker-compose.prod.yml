# Canvas — Production Docker Compose
#
# Usage:
#   1. Copy .env.example to .env and fill in production values
#   2. docker compose -f docker-compose.prod.yml up -d
#
# This adds the Canvas app container on top of the dev services (db + minio).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-canvas}
      POSTGRES_USER: ${POSTGRES_USER:-canvas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-canvas} -d ${POSTGRES_DB:-canvas}']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?Set S3_SECRET_KEY in .env}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY};
      mc mb local/$${S3_BUCKET:-canvas} --ignore-existing;
      mc anonymous set download local/$${S3_BUCKET:-canvas}/public;
      exit 0;
      "
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-canvas}

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - '${PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-canvas}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-canvas}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${PUBLIC_APP_URL:?Set PUBLIC_APP_URL in .env}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-canvas}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  minio_data:
